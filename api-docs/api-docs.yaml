          format: int32
        level:
          type: string
        status:
          type: string
        material:
          type: boolean
        userId:
          type: integer
          format: int64
        facilityId:
          type: integer
          format: int64
        classId:
          type: integer
          format: int64
    FacilityDTO:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        description:
          type: string
        type:
          type: string
        reviewsId:
          type: array
          items:
            type: integer
            format: int64
        imageId:
          type: integer
          format: int64
    ClassesDTO:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        description:
          type: string
        trainer:
          type: string

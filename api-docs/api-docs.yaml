          type: array
          items:
            type: string
        days:
          type: array
          items:
            type: string
        startTime:
          type: array
          items:
            type: string
        duration:
          type: integer
          format: int32
        facilityId:
          type: integer
          format: int64
        imageId:
          type: integer
          format: int64
        reviewsId:
          type: array
          items:
            type: integer
            format: int64
    UserRegisterDTO:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
        phone:
          type: string
        username:
          type: string
        password:
          type: string
      required:
      - email
      - name
      - password

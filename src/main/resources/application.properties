spring.application.name=olympo-academy
server.port = 8443
server.ssl.key-store = classpath:keystore.jks
server.ssl.key-store-password = petanqueros
server.ssl.key-password = petanqueros
server.ssl.key-store-type=JKS

#this allows us to use .html 
spring.mustache.suffix=.html
#connect to our mysql database 
spring.datasource.url=jdbc:mysql://localhost:3306/practicas_db
spring.datasource.username=root
spring.datasource.password=petanqueros123
spring.jpa.hibernate.ddl-auto=update

# Necessary to be able to use accents and the letter ñ
spring.servlet.encoding.charset=UTF-8 
spring.servlet.encoding.enabled=true
spring.servlet.encoding.force=true

logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.web=DEBUG
spring.jpa.properties.hibernate.format_sql=true
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# Maximum file size for a single uploaded file
spring.servlet.multipart.max-file-size=10MB

# Maximum request size (total of all files in a request)
spring.servlet.multipart.max-request-size=20MB